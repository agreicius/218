</h4>
<div class="para logical">
<div class="para">For any real number <span class="process-math">\(t\)</span> for which <span class="process-math">\(\cos(t)\neq 0\text{,}\)</span> we define the <em class="emphasis">tangent of <span class="process-math">\(t\text{,}\)</span></em> denoted <span class="process-math">\(\tan(t)\text{,}\)</span> by</div>
<div class="displaymath process-math">
\begin{equation*}
\tan(t) = \frac{\sin(t)}{\cos(t)}
\end{equation*}
</div>
